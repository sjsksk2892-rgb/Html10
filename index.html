<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML10 - Leitor Inteligente de Código</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .card h2 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .upload-area.drag-over {
            background: #e8ebff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .upload-area input {
            display: none;
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .upload-hint {
            color: #999;
            font-size: 0.9em;
        }

        .or-divider {
            margin: 20px 0;
            text-align: center;
            color: #999;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 250px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-analyze {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-analyze:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-analyze:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
            flex: 0.5;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .btn-export {
            background: #4CAF50;
            color: white;
            font-size: 0.9em;
            padding: 10px 15px;
        }

        .btn-export:hover {
            background: #45a049;
        }

        .results-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .result-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .result-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f8f9ff;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .result-item strong {
            color: #333;
            flex: 1;
        }

        .result-value {
            background: white;
            padding: 6px 12px;
            border-radius: 4px;
            color: #667eea;
            font-weight: bold;
            font-size: 0.9em;
        }

        .language-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            margin: 5px 5px 5px 0;
        }

        .confidence {
            font-size: 0.85em;
            color: #999;
            margin-top: 5px;
        }

        .structure-list {
            margin-top: 15px;
        }

        .structure-list h4 {
            color: #333;
            margin-top: 12px;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .structure-list ul {
            list-style: none;
            margin-left: 0;
        }

        .structure-list li {
            padding: 8px 12px;
            background: #f8f9ff;
            margin-bottom: 6px;
            border-radius: 4px;
            border-left: 3px solid #667eea;
            font-size: 0.9em;
            color: #333;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-box .number {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-box .label {
            font-size: 0.85em;
            opacity: 0.9;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #c33;
            margin-top: 15px;
            display: none;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #3c3;
            margin-top: 15px;
            display: none;
        }

        .export-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 2px solid #ddd;
        }

        .tab {
            padding: 10px 20px;
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
            font-weight: bold;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .code-preview {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 10px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .results-container {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 2em;
            }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 HTML10</h1>
            <p>Leitor Inteligente de Código Multilíngue - Funciona 100% no Navegador</p>
        </header>

        <div class="main-content">
            <!-- Entrada -->
            <div class="card">
                <h2>📝 Entrada de Código</h2>
                
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📤</div>
                    <div class="upload-text">Arraste seu arquivo aqui</div>
                    <div class="upload-hint">ou clique para selecionar</div>
                    <input type="file" id="fileInput" accept=".py,.java,.js,.jsx,.ts,.tsx,.lua,.cpp,.go,.rs,.cs,.html,.css">
                </div>

                <div class="or-divider">OU</div>

                <textarea id="codeInput" placeholder="Cole seu código aqui...&#10;Suporta: Python, Java, JavaScript, Lua, C++, Go, Rust, C#, TypeScript, HTML, CSS"></textarea>

                <input type="text" id="filenameInput" placeholder="Nome do arquivo (ex: code.py)" style="width: 100%; padding: 10px; margin-top: 10px; border: 2px solid #ddd; border-radius: 6px;">

                <div class="button-group">
                    <button class="btn-analyze" id="analyzeBtn">🚀 Analisar Código</button>
                    <button class="btn-clear" id="clearBtn">Limpar</button>
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Analisando código...</p>
                </div>

                <div class="error" id="error"></div>
                <div class="success" id="success"></div>
            </div>

            <!-- Resultados -->
            <div class="card">
                <h2>📊 Resultados da Análise</h2>
                <div id="resultsArea" class="empty-state">
                    <div class="empty-state-icon">⏳</div>
                    <p>Cole código ou upload um arquivo para começar a análise</p>
                </div>
            </div>
        </div>

        <!-- Detalhes -->
        <div class="results-container" id="detailsContainer"></div>
    </div>

    <script>
        // ====================================================================
        // DETECTORES
        // ====================================================================

        class LanguageDetector {
            static PATTERNS = {
                python: {
                    extensions: [".py"],
                    keywords: ["def ", "import ", "class ", "if __name__", "except ", "@"]
                },
                java: {
                    extensions: [".java"],
                    keywords: ["public class", "public static void", "import java", "throws"]
                },
                javascript: {
                    extensions: [".js", ".jsx"],
                    keywords: ["function ", "const ", "let ", "var ", "=>", "require(", "export"]
                },
                lua: {
                    extensions: [".lua"],
                    keywords: ["function ", "local ", "end", "if ", "then", "require"]
                },
                cpp: {
                    extensions: [".cpp", ".cc", ".cxx"],
                    keywords: ["#include", "std::", "void ", "int main", "template"]
                },
                go: {
                    extensions: [".go"],
                    keywords: ["package ", "func ", "import (", "defer ", "go "]
                },
                rust: {
                    extensions: [".rs"],
                    keywords: ["fn ", "let ", "mod ", "use ", "impl ", "match"]
                },
                csharp: {
                    extensions: [".cs"],
                    keywords: ["using ", "namespace ", "public class", "public static"]
                },
                typescript: {
                    extensions: [".ts", ".tsx"],
                    keywords: ["interface ", "type ", "enum ", "namespace ", ": "]
                },
                html: {
                    extensions: [".html", ".htm"],
                    keywords: ["<html", "<body", "<!DOCTYPE", "<div", "class="]
                },
                css: {
                    extensions: [".css"],
                    keywords: ["{", "}", "color:", "background:", "margin:"]
                }
            };

            static detectFromExtension(filename) {
                for (const [lang, patterns] of Object.entries(this.PATTERNS)) {
                    for (const ext of patterns.extensions) {
                        if (filename.endsWith(ext)) {
                            return lang;
                        }
                    }
                }
                return null;
            }

            static detectFromContent(code) {
                const scores = {};
                const codeLower = code.toLowerCase();

                for (const [lang, patterns] of Object.entries(this.PATTERNS)) {
                    let score = 0;
                    for (const keyword of patterns.keywords) {
                        score += (codeLower.match(new RegExp(keyword.toLowerCase(), 'g')) || []).length;
                    }
                    scores[lang] = score;
                }

                const maxScore = Math.max(...Object.values(scores));
                if (maxScore > 0) {
                    return Object.keys(scores).find(k => scores[k] === maxScore);
                }
                return "unknown";
            }

            static detect(code, filename = "") {
                const langExt = filename ? this.detectFromExtension(filename) : null;
                const langContent = this.detectFromContent(code);

                const language = langExt || langContent;
                const confidence = langExt ? 0.9 : 0.6;

                return {
                    language,
                    confidence,
                    method: langExt ? "extension" : "content"
                };
            }
        }

        // ====================================================================
        // PARSERS
        // ====================================================================

        class BaseParser {
            constructor(languageName) {
                this.languageName = languageName;
            }

            extractFunctions(code) { return []; }
            extractClasses(code) { return []; }
            extractImports(code) { return []; }
            extractComments(code) { return []; }

            parse(code) {
                return {
                    language: this.languageName,
                    functions: this.extractFunctions(code),
                    classes: this.extractClasses(code),
                    imports: this.extractImports(code),
                    comments: this.extractComments(code)
                };
            }
        }

        class PythonParser extends BaseParser {
            constructor() { super("Python"); }

            extractFunctions(code) {
                const pattern = /^def\s+([a-zA-Z_]\w*)\s*\((.*?)\)/gm;
                const functions = [];
                let match;
                while ((match = pattern.exec(code)) !== null) {
                    functions.push({
                        name: match[1],
                        params: match[2].split(",").map(p => p.trim()).filter(p => p)
                    });
                }
                return functions;
            }

            extractClasses(code) {
                const pattern = /^class\s+([a-zA-Z_]\w*)\s*(?:\((.*?)\))?/gm;
                const classes = [];
                let match;
                while ((match = pattern.exec(code)) !== null) {
                    classes.push({
                        name: match[1],
                        parent: match[2] || "object"
                    });
                }
                return classes;
            }

            extractImports(code) {
                const imports = [];
                const pattern1 = /^import\s+([^\n]+)/gm;
                const pattern2 = /^from\s+([^\s]+)\s+import\s+([^\n]+)/gm;
                
                let match;
                while ((match = pattern1.exec(code)) !== null) {
                    imports.push(match[0].trim());
                }
                while ((match = pattern2.exec(code)) !== null) {
                    imports.push(match[0].trim());
                }
                return imports;
            }

            extractComments(code) {
                const pattern = /#\s*(.*?)$/gm;
                const comments = [];
                let match;
                while ((match = pattern.exec(code)) !== null) {
                    if (match[1].trim()) {
                        comments.push(match[1].trim());
                    }
                }
                return comments;
            }
        }

        class JavaParser extends BaseParser {
            constructor() { super("Java"); }

            extractFunctions(code) {
                const pattern = /(public|private|protected)?\s+\w+\s+([a-zA-Z_]\w*)\s*\((.*?)\)/g;
                const functions = [];
                let match;
                while ((match = pattern.exec(code)) !== null) {
                    functions.push({
                        name: match[2],
                        params: match[3].split(",").map(p => p.trim()).filter(p => p)
                    });
                }
                return functions;
            }

            extractClasses(code) {
                const pattern = /(public\s+)?class\s+([a-zA-Z_]\w*)\s*(?:extends\s+([^\s{]+))?/g;
                const classes = [];
                let match;
                while ((match = pattern.exec(code)) !== null) {
                    classes.push({
                        name: match[2],
                        parent: match[3] || "Object"
                    });
                }
                return classes;
            }

            extractImports(code) {
                const pattern = /^import\s+([^\n;]+);/gm;
                const imports = [];
                let match;
                while ((match = pattern.exec(code)) !== null) {
                    imports.push(match[1].trim());
                }
                return imports;
            }

            extractComments(code) {
                const comments = [];
                const pattern1 = /\/\/\s*(.*?)$/gm;
                const pattern2 = /\/\*\s*(.*?)\s*\*\//gs;
                
                let match;
                while ((match = pattern1.exec(code)) !== null) {
                    if (match[1].trim()) {
                        comments.push(match[1].trim());
                    }
                }
                while ((match = pattern2.exec(code)) !== null) {
                    if (match[1].trim()) {
                        comments.push(match[1].trim());
                    }
                }
                return comments;
            }
        }

        class JavaScriptParser extends BaseParser {
            constructor() { super("JavaScript"); }

            extractFunctions(code) {
                const functions = [];
                
                const pattern1 = /function\s+([a-zA-Z_]\w*)\s*\((.*?)\)/g;
                let match;
                while ((match = pattern1.exec(code)) !== null) {
                    functions.push({
                        name: match[1],
                        type: "declaration",
                        params: match[2].split(",").map(p => p.trim()).filter(p => p)
                    });
                }

                const pattern2 = /(const|let|var)\s+([a-zA-Z_]\w*)\s*=\s*(?:\(([^)]*)\)\s*)?=>/g;
                while ((match = pattern2.exec(code)) !== null) {
                    functions.push({
                        name: match[2],
                        type: "arrow",
                        params: (match[3] || "").split(",").map(p => p.trim()).filter(p => p)
                    });
                }

                return functions;
            }

            extractClasses(code) {
                const pattern = /class\s+([a-zA-Z_]\w*)\s*(?:extends\s+([^\s{]+))?/g;
                const classes = [];
                let match;
                while ((match = pattern.exec(code)) !== null) {
                    classes.push({
                        name: match[1],
                        parent: match[2] || null
                    });
                }
                return classes;
            }

            extractImports(code) {
                const imports = [];
                
                const pattern1 = /import\s+(?:{[^}]+}|[^'\"\n]+)\s+from\s+['\"]([^'\"]+)['\"]/g;
                let match;
                while ((match = pattern1.exec(code)) !== null) {
                    imports.push(`import from ${match[1]}`);
                }

                const pattern2 = /require\s*\(\s*['\"]([^'\"]+)['\"]\s*\)/g;
                while ((match = pattern2.exec(code)) !== null) {
                    imports.push(`require ${match[1]}`);
                }

                return imports;
            }

            extractComments(code) {
                const comments = [];
                const pattern1 = /\/\/\s*(.*?)$/gm;
                const pattern2 = /\/\*\s*(.*?)\s*\*\//gs;
                
                let match;
                while ((match = pattern1.exec(code)) !== null) {
                    if (match[1].trim()) {
                        comments.push(match[1].trim());
                    }
                }
                while ((match = pattern2.exec(code)) !== null) {
                    if (match[1].trim()) {
                        comments.push(match[1].trim());
                    }
                }
                return comments;
            }
        }

        class LuaParser extends BaseParser {
            constructor() { super("Lua"); }

            extractFunctions(code) {
                const functions = [];
                
                const pattern1 = /function\s+([a-zA-Z_]\w*)\s*\((.*?)\)/g;
                let match;
                while ((match = pattern1.exec(code)) !== null) {
                    functions.push({
                        name: match[1],
                        params: match[2].split(",").map(p => p.trim()).filter(p => p)
                    });
                }

                const pattern2 = /local\s+function\s+([a-zA-Z_]\w*)\s*\((.*?)\)/g;
                while ((match = pattern2.exec(code)) !== null) {
                    functions.push({
                        name: match[1],
                        scope: "local",
                        params: match[2].split(",").map(p => p.trim()).filter(p => p)
                    });
                }

                return functions;
            }

            extractComments(code) {
                const comments = [];
                const pattern = /--\s*(.*?)$/gm;
                let match;
                while ((match = pattern.exec(code)) !== null) {
                    if (match[1].trim()) {
                        comments.push(match[1].trim());
                    }
                }
                return comments;
            }
        }

        // ====================================================================
        // CODE READER
        // ====================================================================

        class CodeReader {
            constructor() {
                this.parsers = {
                    python: new PythonParser(),
                    java: new JavaParser(),
                    javascript: new JavaScriptParser(),
                    lua: new LuaParser(),
                };
            }

            analyze(code, filename = "code.txt") {
                const progLang = LanguageDetector.detect(code, filename);
                
                const analysis = this._analyzeLanguage(code, progLang.language);

                return {
                    filename,
                    programming_language: progLang,
                    statistics: {
                        total_lines: code.split("\n").length,
                        total_characters: code.length,
                        total_words: code.split(/\s+/).filter(w => w).length
                    },
                    analysis,
                    structure: this._extractStructure(code, progLang.language)
                };
            }

            _analyzeLanguage(code, language) {
                if (this.parsers[language]) {
                    return this.parsers[language].parse(code);
                }
                return {
                    language,
                    message: `Parser para ${language} não disponível`,
                    raw_lines: code.split("\n").length
                };
            }

            _extractStructure(code, language) {
                if (language === "python" || language === "java" || language === "javascript" || language === "lua") {
                    const parser = this.parsers[language];
                    return {
                        functions: parser.extractFunctions(code),
                        classes: parser.extractClasses(code),
                        imports: parser.extractImports(code)
                    };
                }
                return { functions: [], classes: [], imports: [] };
            }
        }

        // ====================================================================
        // UI LOGIC
        // ====================================================================

        const reader = new CodeReader();
        const codeInput = document.getElementById("codeInput");
        const filenameInput = document.getElementById("filenameInput");
        const analyzeBtn = document.getElementById("analyzeBtn");
        const clearBtn = document.getElementById("clearBtn");
        const fileInput = document.getElementById("fileInput");
        const uploadArea = document.getElementById("uploadArea");
        const loading = document.getElementById("loading");
        const error = document.getElementById("error");
        const success = document.getElementById("success");
        const resultsArea = document.getElementById("resultsArea");
        const detailsContainer = document.getElementById("detailsContainer");

        // Upload area drag and drop
        uploadArea.addEventListener("dragover", (e) => {
            e.preventDefault();
            uploadArea.classList.add("drag-over");
        });

        uploadArea.addEventListener("dragleave", () => {
            uploadArea.classList.remove("drag-over");
        });

        uploadArea.addEventListener("drop", (e) => {
            e.preventDefault();
            uploadArea.classList.remove("drag-over");
            handleFile(e.dataTransfer.files[0]);
        });

        uploadArea.addEventListener("click", () => {
            fileInput.click();
        });

        fileInput.addEventListener("change", (e) => {
            if (e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            filenameInput.value = file.name;
            const reader = new FileReader();
            reader.onload = (e) => {
                codeInput.value = e.target.result;
                showSuccess(`Arquivo "${file.name}" carregado com sucesso!`);
            };
            reader.readAsText(file);
        }

        analyzeBtn.addEventListener("click", () => {
            const code = codeInput.value.trim();
            if (!code) {
                showError("Por favor, digite ou upload código!");
                return;
            }

            loading.style.display = "block";
            error.style.display = "none";
            success.style.display = "none";

            setTimeout(() => {
                try {
                    const filename = filenameInput.value || "code.txt";
                    const analysis = reader.analyze(code, filename);
                    displayResults(analysis);
                    loading.style.display = "none";
                    showSuccess("Análise concluída com sucesso!");
                } catch (err) {
                    loading.style.display = "none";
                    showError("Erro na análise: " + err.message);
                }
            }, 500);
        });

        clearBtn.addEventListener("click", () => {
            codeInput.value = "";
            filenameInput.value = "";
            resultsArea.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⏳</div><p>Cole código ou upload um arquivo para começar a análise</p></div>';
            detailsContainer.innerHTML = "";
            error.style.display = "none";
            success.style.display = "none";
        });

        function displayResults(analysis) {
            const progLang = analysis.programming_language;
            const stats = analysis.statistics;
            const struct = analysis.structure;

            resultsArea.innerHTML = `
                <div style="padding: 20px;">
                    <h3 style="color: #667eea; margin-bottom: 15px;">✨ Análise Completa</h3>
                    
                    <div class="result-item">
                        <strong>🖥️ Linguagem de Programação:</strong>
                        <span class="result-value">${progLang.language}</span>
                    </div>
                    
                    <div class="result-item">
                        <strong>📊 Confiança:</strong>
                        <span class="result-value">${(progLang.confidence * 100).toFixed(1)}%</span>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="number">${stats.total_lines}</div>
                            <div class="label">Linhas</div>
                        </div>
                        <div class="stat-box">
                            <div class="number">${stats.total_characters}</div>
                            <div class="label">Caracteres</div>
                        </div>
                        <div class="stat-box">
                            <div class="number">${stats.total_words}</div>
                            <div class="label">Palavras</div>
                        </div>
                    </div>

                    <div class="export-buttons">
                        <button class="btn-export" onclick="exportJSON('${analysis.filename}', '${btoa(JSON.stringify(analysis))}')" title="Baixar como JSON">📥 JSON</button>
                        <button class="btn-export" onclick="exportHTML('${analysis.filename}', '${btoa(JSON.stringify(analysis))}')" title="Baixar como HTML">🌐 HTML</button>
                        <button class="btn-export" onclick="exportMarkdown('${analysis.filename}', '${btoa(JSON.stringify(analysis))}')" title="Baixar como Markdown">📝 MD</button>
                    </div>
                </div>
            `;

            detailsContainer.innerHTML = `
                <div class="result-card">
                    <h3>📋 Funções (${struct.functions.length})</h3>
                    ${struct.functions.length > 0 ? 
                        `<ul>${struct.functions.map(f => `<li><strong>${f.name}</strong> (${f.params.length} params)</li>`).join('')}</ul>` :
                        '<p style="color: #999;">Nenhuma função encontrada</p>'
                    }
                </div>

                <div class="result-card">
                    <h3>🏛️ Classes (${struct.classes.length})</h3>
                    ${struct.classes.length > 0 ? 
                        `<ul>${struct.classes.map(c => `<li><strong>${c.name}</strong> ${c.parent ? `extends ${c.parent}` : ''}</li>`).join('')}</ul>` :
                        '<p style="color: #999;">Nenhuma classe encontrada</p>'
                    }
                </div>

                <div class="result-card">
                    <h3>📦 Imports (${struct.imports.length})</h3>
                    ${struct.imports.length > 0 ? 
                        `<ul>${struct.imports.map(i => `<li>${i}</li>`).join('')}</ul>` :
                        '<p style="color: #999;">Nenhum import encontrado</p>'
                    }
                </div>

                <div class="result-card">
                    <h3>💬 Comentários (${analysis.analysis.comments ? analysis.analysis.comments.length : 0})</h3>
                    ${analysis.analysis.comments && analysis.analysis.comments.length > 0 ? 
                        `<ul>${analysis.analysis.comments.slice(0, 5).map(c => `<li>${c}</li>`).join('')}${analysis.analysis.comments.length > 5 ? `<li><em>+${analysis.analysis.comments.length - 5} mais</em></li>` : ''}</ul>` :
                        '<p style="color: #999;">Nenhum comentário encontrado</p>'
                    }
                </div>
            `;
        }

        function showError(message) {
            error.textContent = "❌ " + message;
            error.style.display = "block";
        }

        function showSuccess(message) {
            success.textContent = "✅ " + message;
            success.style.display = "block";
            setTimeout(() => {
                success.style.display = "none";
            }, 3000);
        }

        function exportJSON(filename, encodedData) {
            const analysis = JSON.parse(atob(encodedData));
            const dataStr = JSON.stringify(analysis, null, 2);
            downloadFile(dataStr, filename.replace(/\.\w+$/, '.json'), 'application/json');
        }

        function exportHTML(filename, encodedData) {
            const analysis = JSON.parse(atob(encodedData));
            const progLang = analysis.programming_language;
            const stats = analysis.statistics;
            const struct = analysis.structure;

            const html = `<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise: ${filename}</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        h1 { color: #667eea; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th { background: #667eea; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
        ul { list-style: none; padding: 0; }
        li { padding: 8px; background: #f8f9ff; margin: 5px 0; border-radius: 4px; border-left: 3px solid #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Análise de Código: ${filename}</h1>
        <h2>🔍 Linguagem: ${progLang.language} (${(progLang.confidence * 100).toFixed(1)}% confiança)</h2>
        
        <h3>📈 Estatísticas</h3>
        <table>
            <tr><th>Métrica</th><th>Valor</th></tr>
            <tr><td>Linhas</td><td>${stats.total_lines}</td></tr>
            <tr><td>Caracteres</td><td>${stats.total_characters}</td></tr>
            <tr><td>Palavras</td><td>${stats.total_words}</td></tr>
        </table>

        <h3>📋 Funções (${struct.functions.length})</h3>
        <ul>${struct.functions.map(f => `<li><strong>${f.name}</strong></li>`).join('')}</ul>

        <h3>🏛️ Classes (${struct.classes.length})</h3>
        <ul>${struct.classes.map(c => `<li><strong>${c.name}</strong></li>`).join('')}</ul>

        <h3>📦 Imports (${struct.imports.length})</h3>
        <ul>${struct.imports.map(i => `<li>${i}</li>`).join('')}</ul>
    </div>
</body>
</html>`;
            downloadFile(html, filename.replace(/\.\w+$/, '.html'), 'text/html');
        }

        function exportMarkdown(filename, encodedData) {
            const analysis = JSON.parse(atob(encodedData));
            const progLang = analysis.programming_language;
            const stats = analysis.statistics;
            const struct = analysis.structure;

            const md = `# 📊 Análise: ${filename}

## 🔍 Linguagem de Programação
- **Linguagem:** ${progLang.language}
- **Confiança:** ${(progLang.confidence * 100).toFixed(1)}%

## 📈 Estatísticas

| Métrica | Valor |
|---------|-------|
| Linhas | ${stats.total_lines} |
| Caracteres | ${stats.total_characters} |
| Palavras | ${stats.total_words} |

## 📋 Funções (${struct.functions.length})
${struct.functions.map(f => `- **${f.name}**`).join('\n')}

## 🏛️ Classes (${struct.classes.length})
${struct.classes.map(c => `- **${c.name}**`).join('\n')}

## 📦 Imports (${struct.imports.length})
${struct.imports.map(i => `- ${i}`).join('\n')}

---
*Gerado por HTML10 - Leitor Inteligente de Código*
`;
            downloadFile(md, filename.replace(/\.\w+$/, '.md'), 'text/markdown');
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            showSuccess(`Arquivo "${filename}" baixado!`);
        }
    </script>
</body>
</html>
